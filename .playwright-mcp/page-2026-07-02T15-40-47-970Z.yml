        - paragraph [ref=f1e29]: Our story
        - heading "Built for the in-between moments." [level=2] [ref=f1e30]
        - paragraph [ref=f1e31]: Most businesses don't fail because of one wrong decision. They drift — unclear on the goal, unsure of the next step, busy without progress. Novusfy was founded to close that gap.
        - paragraph [ref=f1e32]: We bring together strategy, marketing, digital systems, and practical learning under one roof so growth isn't fragmented across five vendors and three half-finished plans. One partner, one direction, real momentum.
        - paragraph [ref=f1e33]: From offices in Germany and Erbil, we work with businesses, startups, and ambitious professionals across the region who are ready to grow, launch, or reinvent.
